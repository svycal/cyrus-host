# fly.toml for the self-hosted Cyrus agent (shared infra). See README.md.
#
# Always-on by design: there is NO [http_service], so Fly never autostops the
# machine. Cyrus connects outbound via a Cloudflare tunnel (hosted-connected
# mode) and must stay running to receive work.

app = 'savvycal-cyrus'
primary_region = 'iad'

# Spill room so a memory spike degrades gracefully instead of hanging the VM
# (a thrash with no swap is what made the box unreachable on 2026-06-24).
swap_size_mb = 2048

[build]

[env]
  # Pin per-repo runtime + state under the volume so nothing depends on the
  # ephemeral root filesystem.
  MISE_DATA_DIR = '/home/cyrus/.cyrus/mise/data'
  MISE_CACHE_DIR = '/home/cyrus/.cyrus/mise/cache'

[mounts]
  source = 'cyrus_data'
  destination = '/home/cyrus/.cyrus'

[[vm]]
  size = 'performance-2x'
  memory = '8gb'
